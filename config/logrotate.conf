# ============================================================================
# logrotate.conf — AutoFarm Zero log rotation configuration
# Success Guru Network v6.0
#
# Install: cp config/logrotate.conf /etc/logrotate.d/autofarm
#
# Rotation policy:
#   - Rotate daily OR when file exceeds 50 MB
#   - Retain 7 days of rotated logs
#   - Compress rotated files with gzip
#   - Use copytruncate to avoid restarting daemons
#   - JSON structured logging via structlog
# ============================================================================

# ---------------------------------------------------------------------------
# Content VM application logs
# ---------------------------------------------------------------------------
/app/logs/generate.log
/app/logs/review.log
/app/logs/publish.log
/app/logs/tokens.log
/app/logs/analytics.log
/app/logs/backgrounds.log
/app/logs/schedule.log
/app/logs/health.log
/app/logs/backup.log
/app/logs/gdrive.log
/app/logs/cleanup.log
/app/logs/idle_guard.log
/app/logs/config_validate.log
/app/logs/queue_depth.log
/app/logs/storage.log
/app/logs/user_agents.log
{
    daily
    rotate 7
    maxsize 50M
    compress
    delaycompress
    missingok
    notifempty
    copytruncate
    dateext
    dateformat -%Y%m%d
    create 0640 autofarm autofarm
}

# ---------------------------------------------------------------------------
# Proxy VM logs
# ---------------------------------------------------------------------------
/app/logs/approval_server.log
/app/logs/telegram_bot.log
{
    daily
    rotate 7
    maxsize 50M
    compress
    delaycompress
    missingok
    notifempty
    copytruncate
    dateext
    dateformat -%Y%m%d
    create 0640 autofarm autofarm
}

# ---------------------------------------------------------------------------
# Squid proxy logs (one per brand)
# ---------------------------------------------------------------------------
/var/log/squid/human_success_guru/*.log
/var/log/squid/wealth_success_guru/*.log
/var/log/squid/zen_success_guru/*.log
/var/log/squid/social_success_guru/*.log
/var/log/squid/habits_success_guru/*.log
/var/log/squid/relationships_success_guru/*.log
{
    daily
    rotate 7
    maxsize 50M
    compress
    delaycompress
    missingok
    notifempty
    create 0640 proxy proxy
    sharedscripts
    postrotate
        /usr/sbin/squid -k rotate 2>/dev/null || true
    endscript
}
